<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">GBR-CC data path</title>
  <desc id="desc">Phone modem DIAG telemetry is read by cellninjia_mobile, forwarded over adb to a host parser, converted into a GBR ratio, and delivered to MsQuic GBR-CC control.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 36px Arial, Helvetica, sans-serif; fill: #111; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #333; }
      .group-title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 700 21px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 400 16px Arial, Helvetica, sans-serif; fill: #222; }
      .tiny { font: 400 14px Arial, Helvetica, sans-serif; fill: #222; }
      .box { fill: #fff; stroke: #111; stroke-width: 2.4; }
      .group { fill: #fff; stroke: #111; stroke-width: 3; }
      .dash { fill: #fff; stroke: #111; stroke-width: 2.4; stroke-dasharray: 8 6; }
      .arrow { stroke: #111; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #111; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .note { fill: #fff; stroke: #111; stroke-width: 2.2; }
    </style>
  </defs>

  <rect x="1" y="1" width="1098" height="648" fill="#fff" stroke="#ddd"/>
  <text x="550" y="50" text-anchor="middle" class="title">GBR-CC Data Path in MsQuic</text>
  <text x="550" y="78" text-anchor="middle" class="subtitle">modem scheduler telemetry -> ratio calculation -> pacing and cwnd control</text>
  <line x1="230" y1="97" x2="870" y2="97" stroke="#111" stroke-width="1.2"/>

  <rect x="35" y="125" width="270" height="430" rx="18" class="group"/>
  <text x="170" y="160" text-anchor="middle" class="group-title">Android Phone</text>

  <rect x="70" y="205" width="200" height="105" rx="8" class="box"/>
  <text x="170" y="240" text-anchor="middle" class="label">Phone Modem</text>
  <text x="170" y="270" text-anchor="middle" class="small">DIAG telemetry</text>
  <text x="170" y="292" text-anchor="middle" class="tiny">BSR / grant / PUSCH</text>

  <rect x="70" y="390" width="200" height="105" rx="8" class="box"/>
  <text x="170" y="428" text-anchor="middle" class="label">cellninjia</text>
  <text x="170" y="457" text-anchor="middle" class="small">read DIAG stream</text>
  <text x="170" y="480" text-anchor="middle" class="tiny">cellninjia_mobile</text>

  <path d="M 170 312 L 170 386" class="thin"/>

  <rect x="340" y="335" width="135" height="70" rx="7" class="note"/>
  <text x="407" y="363" text-anchor="middle" class="label">adb</text>
  <text x="407" y="389" text-anchor="middle" class="small">forward</text>
  <text x="407" y="427" text-anchor="middle" class="tiny">tcp:43555</text>

  <path d="M 270 442 L 318 442 L 318 370 L 335 370" class="arrow"/>

  <rect x="520" y="125" width="540" height="430" rx="18" class="group"/>
  <text x="790" y="160" text-anchor="middle" class="group-title">Host PC</text>

  <rect x="545" y="205" width="180" height="105" rx="8" class="box"/>
  <text x="635" y="238" text-anchor="middle" class="label">DIAG Parser</text>
  <text x="635" y="268" text-anchor="middle" class="small">LTE / 5G mode</text>
  <text x="635" y="291" text-anchor="middle" class="tiny">align BSR and grants</text>

  <path d="M 475 370 L 502 370 L 502 258 L 540 258" class="arrow"/>

  <rect x="545" y="395" width="180" height="115" rx="8" class="box"/>
  <text x="635" y="430" text-anchor="middle" class="label">GBR Calc</text>
  <text x="635" y="462" text-anchor="middle" class="small">allocated / requested</text>
  <text x="635" y="486" text-anchor="middle" class="small">output: ratio</text>

  <path d="M 635 312 L 635 391" class="thin"/>

  <rect x="760" y="395" width="170" height="115" rx="8" class="box"/>
  <text x="845" y="430" text-anchor="middle" class="label">Unix Socket</text>
  <text x="845" y="462" text-anchor="middle" class="small">one double</text>
  <text x="845" y="486" text-anchor="middle" class="tiny">ratio packet</text>

  <path d="M 725 452 L 755 452" class="arrow"/>
  <text x="740" y="437" text-anchor="middle" class="tiny">ratio</text>

  <rect x="760" y="205" width="170" height="105" rx="8" class="box"/>
  <text x="845" y="238" text-anchor="middle" class="label">MsQuic</text>
  <text x="845" y="268" text-anchor="middle" class="small">ratio receiver</text>
  <text x="845" y="291" text-anchor="middle" class="tiny">EMA smoothing</text>

  <path d="M 845 395 L 845 314" class="thin"/>
  <text x="870" y="356" class="tiny">recv</text>

  <rect x="990" y="210" width="58" height="290" rx="8" class="dash"/>
  <text x="1019" y="250" text-anchor="middle" class="label">GBR</text>
  <text x="1019" y="275" text-anchor="middle" class="label">CC</text>
  <line x1="999" y1="300" x2="1039" y2="300" stroke="#111" stroke-width="1.8"/>
  <text x="1019" y="340" text-anchor="middle" class="tiny">pacing</text>
  <text x="1019" y="362" text-anchor="middle" class="tiny">rate</text>
  <text x="1019" y="402" text-anchor="middle" class="tiny">cwnd</text>
  <text x="1019" y="452" text-anchor="middle" class="tiny">secnet</text>
  <text x="1019" y="472" text-anchor="middle" class="tiny">perf</text>

  <path d="M 930 258 L 985 258" class="arrow"/>
  <text x="958" y="239" text-anchor="middle" class="tiny">control</text>
</svg>
